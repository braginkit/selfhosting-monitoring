services:
  monitor-worker:
    image: ${MONITOR_IMAGE:-ghcr.io/braginkit/selfhosting-monitoring:latest}
    restart: unless-stopped
    env_file:
      - .env.base
      - .env
    extra_hosts:
      # HTTP/SMTP checks from the container must hit LAN Caddy/mail, not WAN hairpin.
      - "hoppscotch.bragin.crazedns.ru:192.168.1.75"
      - "matrix.bragin.crazedns.ru:192.168.1.75"
      - "appflowy.bragin.crazedns.ru:192.168.1.75"
      - "auth.bragin.crazedns.ru:192.168.1.75"
      - "mail.bragin.crazedns.ru:192.168.1.75"
    volumes:
      - ./targets.yml:/app/targets.yml:ro
      # Postfix logs from docker-mailserver (external volume `mail_mail_logs` on GEEKOM).
      - mail_logs:/var/log/mail:ro
    command: ["python", "-m", "monitoring.apps.worker"]
    depends_on:
      redis:
        condition: service_started

  matrix-bot:
    image: ${MONITOR_IMAGE:-ghcr.io/braginkit/selfhosting-monitoring:latest}
    restart: unless-stopped
    env_file:
      - .env.base
      - .env
    command: ["python", "-m", "monitoring.apps.matrix_bot"]
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  mail_logs:
    external: true
    name: mail_mail_logs
